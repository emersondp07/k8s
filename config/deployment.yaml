apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-server
  labels:
    app: go-server
spec:
  selector:
    matchLabels:
      app: go-server
  replicas: 1
  template:
    metadata:
      labels:
        app: "go-server"
    spec:
      containers:
        - name: go-server
          image: "emersondp07/hello-go:v3"
          env:
            - name: NAME
              value: "Emerson"
            - name: AGE
              value: "29"
